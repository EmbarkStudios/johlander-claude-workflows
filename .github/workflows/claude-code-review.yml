name: Claude Code Review

on:
  workflow_call:
    inputs:
      max_turns:
        description: 'Maximum number of Claude turns'
        required: false
        type: number
        default: 30
      review_prompt:
        description: 'Custom review prompt (overrides default)'
        required: false
        type: string
      allowed_tools:
        description: 'Claude allowed tools'
        required: false
        type: string
        default: 'Bash(gh:*),Bash(grep:*),Bash(sed:*),Read,Glob,Grep'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: ${{ inputs.review_prompt || format('/code-review:code-review {0}/pull/{1}', github.repository, github.event.pull_request.number) }}
          claude_args: '--max-turns ${{ inputs.max_turns }} --allowedTools ${{ inputs.allowed_tools }}'
          track_progress: true
          include_fix_links: true
          show_full_output: true
